
<style>
*{box-sizing:border-box;margin:0;padding:0}
.db{font-family:var(--font-sans);padding:1.25rem 0}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.brand{font-size:16px;font-weight:500;color:var(--color-text-primary);display:flex;align-items:center;gap:8px}
.week-pill{font-size:12px;padding:4px 10px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary)}
.nav{display:flex;gap:4px}
.ntab{padding:5px 12px;border-radius:var(--border-radius-md);border:0.5px solid transparent;background:transparent;font-size:13px;cursor:pointer;color:var(--color-text-secondary);transition:all .15s}
.ntab:hover{background:var(--color-background-secondary)}
.ntab.on{background:var(--color-background-primary);border-color:var(--color-border-secondary);color:var(--color-text-primary);font-weight:500}

.full-board{display:grid;grid-template-columns:64px repeat(4,minmax(0,1fr));gap:0}

.row-label-col{display:contents}
.row-label{display:flex;align-items:center;justify-content:center;padding:8px 4px;writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);font-size:11px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:.05em;border-right:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.row-label.rl-backlog{color:#444441}
.row-label.rl-inprog{color:#185FA5}
.row-label.rl-done{color:#27500A}

.col-header{padding:12px 10px 10px;border-bottom:0.5px solid var(--color-border-tertiary);border-left:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);display:flex;align-items:center;gap:8px}
.corner{background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary);border-right:0.5px solid var(--color-border-tertiary)}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.col-name{font-size:13px;font-weight:500;color:var(--color-text-primary)}

.cell{border-left:0.5px solid var(--color-border-tertiary);border-top:0.5px solid var(--color-border-tertiary);padding:10px;background:var(--color-background-secondary);min-height:120px;vertical-align:top}
.cell.done-row{background:var(--color-background-primary)}
.cell-inner{display:flex;flex-direction:column;gap:8px}

.add-btn{width:100%;padding:5px 8px;border-radius:var(--border-radius-md);border:0.5px dashed var(--color-border-tertiary);background:transparent;color:var(--color-text-tertiary);font-size:12px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:4px}
.add-btn:hover{background:var(--color-background-primary);color:var(--color-text-secondary)}

.topic-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:9px 10px}
.tc-title{font-size:12px;font-weight:500;color:var(--color-text-primary);display:flex;align-items:flex-start;justify-content:space-between;gap:4px;margin-bottom:4px;line-height:1.4}
.tc-del{background:none;border:none;cursor:pointer;color:var(--color-text-tertiary);font-size:13px;padding:0;flex-shrink:0}
.tc-del:hover{color:#E24B4A}
.tc-meta{font-size:10px;color:var(--color-text-tertiary);margin-bottom:5px;line-height:1.6}
.tc-overdue{color:#A32D2D}
.st-prog{height:3px;background:var(--color-border-tertiary);border-radius:99px;margin-bottom:6px;overflow:hidden}
.st-progbar{height:100%;border-radius:99px;transition:width .3s}
.subtasks{margin-bottom:5px}
.st-row{display:flex;align-items:center;gap:5px;padding:2px 0}
.st-cb{width:13px;height:13px;accent-color:#378ADD;flex-shrink:0;cursor:pointer}
.st-lbl{font-size:11px;color:var(--color-text-secondary);flex:1;line-height:1.3}
.st-lbl.done{text-decoration:line-through;color:var(--color-text-tertiary)}
.st-del{background:none;border:none;cursor:pointer;color:var(--color-text-tertiary);font-size:12px;padding:0}
.st-del:hover{color:#E24B4A}
.add-st-inp{width:100%;font-size:11px;padding:3px 7px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-primary);margin-bottom:4px}
.add-st-inp:focus{outline:none;border-color:#378ADD}
.mv-select{width:100%;font-size:11px;padding:4px 6px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-tertiary);cursor:pointer}

.form-overlay{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:10px;margin-bottom:8px}
.form-lbl{font-size:10px;color:var(--color-text-secondary);margin-bottom:3px;font-weight:500}
.form-inp{width:100%;font-size:12px;padding:5px 8px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-primary);margin-bottom:7px}
.form-inp:focus{outline:none;border-color:#378ADD}
.form-btns{display:flex;gap:5px}
.fbtn{flex:1;padding:5px;font-size:12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;color:var(--color-text-secondary)}
.fbtn:hover{background:var(--color-background-secondary)}
.fbtn.primary{background:#378ADD;color:#fff;border-color:#378ADD}
.fbtn.primary:hover{background:#185FA5}

.ov-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.25rem}
.ov-stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.75rem 1rem}
.ov-num{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.ov-lbl{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.ov-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem}
.member-ov-row{display:grid;grid-template-columns:90px 1fr 80px 36px;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.member-ov-row:last-child{border-bottom:none}
.pbar-wrap{height:5px;background:var(--color-background-secondary);border-radius:99px;overflow:hidden}
.pbar{height:100%;border-radius:99px;transition:width .3s}
</style>

<div class="db">
  <div class="topbar">
    <div class="brand">
      <i class="ti ti-layout-kanban" aria-hidden="true" style="font-size:18px"></i>
      MotoSpex AI
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="week-pill" id="weekPill"></div>
      <div class="nav">
        <button class="ntab on" onclick="showView('board',this)"><i class="ti ti-layout-kanban" aria-hidden="true" style="font-size:13px;vertical-align:-1px;margin-right:3px"></i>Board</button>
        <button class="ntab" onclick="showView('overview',this)"><i class="ti ti-chart-bar" aria-hidden="true" style="font-size:13px;vertical-align:-1px;margin-right:3px"></i>Overview</button>
      </div>
    </div>
  </div>

  <div id="view-board">
    <div class="full-board" id="fullBoard"></div>
  </div>

  <div id="view-overview" style="display:none">
    <div class="ov-grid" id="ovStats"></div>
    <div class="ov-card">
      <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:10px">Progress by member</div>
      <div id="ovRows"></div>
    </div>
  </div>
</div>

<script>
const MEMBERS=[
  {id:'karan',name:'Karan',initials:'KA',bg:'#E6F1FB',fg:'#0C447C',bar:'#378ADD'},
  {id:'sagarika',name:'Sagarika',initials:'SA',bg:'#E1F5EE',fg:'#085041',bar:'#1D9E75'},
  {id:'jatin',name:'Jatin',initials:'JA',bg:'#FAEEDA',fg:'#633806',bar:'#EF9F27'},
  {id:'felix',name:'Felix',initials:'FE',bg:'#EEEDFE',fg:'#3C3489',bar:'#7F77DD'},
];
const ROWS=[
  {id:'backlog',label:'Backlog',cls:'rl-backlog',icon:'ti-circle'},
  {id:'inprogress',label:'In progress',cls:'rl-inprog',icon:'ti-progress'},
  {id:'done',label:'Done',cls:'rl-done',icon:'ti-circle-check'},
];
const SK='msx_v4';
let state={};
let addingIn={};

function getWeekNum(d){const j=new Date(d.getFullYear(),0,4);return Math.ceil(((d-j)/86400000+j.getDay()+1)/7);}
function fmtDate(ts){if(!ts)return '';const d=new Date(ts);return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',yy:'numeric'});}
function fmtShort(ts){if(!ts)return '';const d=new Date(ts);return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});}
function daysAgo(ts){if(!ts)return 0;return Math.floor((Date.now()-ts)/86400000);}
function daysUntil(dateStr){if(!dateStr)return null;return Math.ceil((new Date(dateStr).getTime()-Date.now())/86400000);}

function load(){
  try{const r=localStorage.getItem(SK);if(r)state=JSON.parse(r);}catch(e){}
  MEMBERS.forEach(m=>{if(!state[m.id])state[m.id]={topics:[]};});
}
function save(){try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}}

function subtaskPct(topic){
  if(!topic.subtasks||!topic.subtasks.length)return null;
  return Math.round(topic.subtasks.filter(s=>s.done).length/topic.subtasks.length*100);
}

function renderWeek(){
  const now=new Date();
  document.getElementById('weekPill').textContent='CW '+getWeekNum(now)+' · '+now.getFullYear();
}

function renderTopicCard(mid,topic,row){
  const age=daysAgo(topic.addedAt);
  const du=daysUntil(topic.targetDate);
  const pct=subtaskPct(topic);
  const m=MEMBERS.find(x=>x.id===mid);
  const otherRows=ROWS.filter(r=>r.id!==row.id);
  let h=`<div class="topic-card">
    <div class="tc-title"><span>${topic.title}</span><button class="tc-del" onclick="delTopic('${mid}',${topic.id})" aria-label="Delete"><i class="ti ti-trash" aria-hidden="true"></i></button></div>
    <div class="tc-meta">
      <i class="ti ti-clock" aria-hidden="true" style="font-size:10px;vertical-align:-1px"></i> ${fmtShort(topic.addedAt)} · ${age===0?'today':age+'d ago'}`;
  if(topic.targetDate){
    const overdue=du!==null&&du<0;
    h+=`<br><span class="${overdue?'tc-overdue':''}"><i class="ti ti-calendar-due" aria-hidden="true" style="font-size:10px;vertical-align:-1px"></i> Due ${fmtShort(new Date(topic.targetDate).getTime())}${du!==null?(du<0?' · '+Math.abs(du)+'d over':du===0?' · today':' · '+du+'d left'):''}</span>`;
  }
  h+=`</div>`;
  if(pct!==null) h+=`<div class="st-prog"><div class="st-progbar" style="background:${m.bar};width:${pct}%"></div></div>`;
  if(topic.subtasks&&topic.subtasks.length){
    h+=`<div class="subtasks">`;
    topic.subtasks.forEach(st=>{
      h+=`<div class="st-row">
        <input type="checkbox" class="st-cb" ${st.done?'checked':''} onchange="toggleST('${mid}',${topic.id},${st.id})" aria-label="Complete subtask">
        <span class="st-lbl${st.done?' done':''}">${st.text}</span>
        <button class="st-del" onclick="delST('${mid}',${topic.id},${st.id})" aria-label="Remove"><i class="ti ti-x" aria-hidden="true"></i></button>
      </div>`;
    });
    h+=`</div>`;
  }
  h+=`<input class="add-st-inp" placeholder="+ subtask, Enter" onkeydown="if(event.key==='Enter')addST('${mid}',${topic.id},this)">`;
  h+=`<select class="mv-select" onchange="moveTopic('${mid}',${topic.id},this.value)">
    <option value="">Move to…</option>
    ${otherRows.map(r=>`<option value="${r.id}">${r.label}</option>`).join('')}
  </select>`;
  h+=`</div>`;
  return h;
}

function renderBoard(){
  const m=MEMBERS;
  let h='';

  h+=`<div class="corner"></div>`;
  m.forEach(mem=>{
    h+=`<div class="col-header">
      <div class="av" style="background:${mem.bg};color:${mem.fg}">${mem.initials}</div>
      <span class="col-name">${mem.name}</span>
    </div>`;
  });

  ROWS.forEach(row=>{
    h+=`<div class="row-label ${row.cls}">${row.label}</div>`;
    m.forEach(mem=>{
      const topics=(state[mem.id].topics||[]).filter(t=>t.col===row.id);
      const key=mem.id+row.id;
      const isAdding=addingIn[key];
      h+=`<div class="cell${row.id==='done'?' done-row':''}"><div class="cell-inner">`;
      if(isAdding){
        h+=`<div class="form-overlay">
          <div class="form-lbl">Topic title</div>
          <input class="form-inp" id="fi-${key}" placeholder="e.g. API integration">
          <div class="form-lbl">Target date</div>
          <input class="form-inp" type="date" id="fd-${key}">
          <div class="form-btns">
            <button class="fbtn" onclick="cancelAdd('${mem.id}','${row.id}')">Cancel</button>
            <button class="fbtn primary" onclick="addTopic('${mem.id}','${row.id}')">Add</button>
          </div>
        </div>`;
      }
      topics.forEach(topic=>{h+=renderTopicCard(mem.id,topic,row);});
      h+=`<button class="add-btn" onclick="startAdd('${mem.id}','${row.id}')"><i class="ti ti-plus" aria-hidden="true" style="font-size:12px"></i> Add topic</button>`;
      h+=`</div></div>`;
    });
  });

  document.getElementById('fullBoard').innerHTML=h;
}

function startAdd(mid,rid){addingIn[mid+rid]=true;renderBoard();}
function cancelAdd(mid,rid){delete addingIn[mid+rid];renderBoard();}
function addTopic(mid,rid){
  const key=mid+rid;
  const t=document.getElementById('fi-'+key);
  const d=document.getElementById('fd-'+key);
  const title=(t?t.value:'').trim();
  if(!title)return;
  state[mid].topics.push({id:Date.now(),title,col:rid,addedAt:Date.now(),targetDate:d?d.value:'',subtasks:[]});
  delete addingIn[key];
  save();renderBoard();
}
function delTopic(mid,tid){
  state[mid].topics=state[mid].topics.filter(t=>t.id!==tid);
  save();renderBoard();
}
function moveTopic(mid,tid,newCol){
  if(!newCol)return;
  const t=state[mid].topics.find(t=>t.id===tid);
  if(t)t.col=newCol;
  save();renderBoard();renderOverview();
}
function addST(mid,tid,inp){
  const text=inp.value.trim();
  if(!text)return;
  const t=state[mid].topics.find(t=>t.id===tid);
  if(t)t.subtasks.push({id:Date.now(),text,done:false});
  inp.value='';
  save();renderBoard();
}
function toggleST(mid,tid,sid){
  const t=state[mid].topics.find(t=>t.id===tid);
  if(t){const s=t.subtasks.find(s=>s.id===sid);if(s)s.done=!s.done;}
  save();renderBoard();
}
function delST(mid,tid,sid){
  const t=state[mid].topics.find(t=>t.id===tid);
  if(t)t.subtasks=t.subtasks.filter(s=>s.id!==sid);
  save();renderBoard();
}

function renderOverview(){
  let totalTopics=0,totalDone=0,totalSTs=0,doneSTs=0;
  MEMBERS.forEach(m=>{
    (state[m.id].topics||[]).forEach(t=>{
      totalTopics++;
      if(t.col==='done')totalDone++;
      (t.subtasks||[]).forEach(s=>{totalSTs++;if(s.done)doneSTs++;});
    });
  });
  const teamPct=totalTopics?Math.round(totalDone/totalTopics*100):0;
  document.getElementById('ovStats').innerHTML=`
    <div class="ov-stat"><div class="ov-num">${totalTopics}</div><div class="ov-lbl">Total topics</div></div>
    <div class="ov-stat"><div class="ov-num">${totalDone}</div><div class="ov-lbl">Completed</div></div>
    <div class="ov-stat"><div class="ov-num">${teamPct}%</div><div class="ov-lbl">Done rate</div></div>
    <div class="ov-stat"><div class="ov-num">${doneSTs}/${totalSTs}</div><div class="ov-lbl">Subtasks done</div></div>
  `;
  document.getElementById('ovRows').innerHTML=MEMBERS.map(m=>{
    const topics=state[m.id].topics||[];
    const done=topics.filter(t=>t.col==='done').length;
    const inp=topics.filter(t=>t.col==='inprogress').length;
    const bl=topics.filter(t=>t.col==='backlog').length;
    const pct=topics.length?Math.round(done/topics.length*100):0;
    return `<div class="member-ov-row">
      <div style="display:flex;align-items:center;gap:7px">
        <div class="av" style="background:${m.bg};color:${m.fg};width:24px;height:24px;font-size:10px">${m.initials}</div>
        <span style="font-size:13px;color:var(--color-text-primary)">${m.name}</span>
      </div>
      <div class="pbar-wrap"><div class="pbar" style="background:${m.bar};width:${pct}%"></div></div>
      <div style="font-size:11px;color:var(--color-text-tertiary);text-align:right">${bl}B · ${inp}P · ${done}D</div>
      <div style="font-size:12px;font-weight:500;color:${m.bar};text-align:right">${pct}%</div>
    </div>`;
  }).join('');
}

function showView(v,btn){
  document.getElementById('view-board').style.display=v==='board'?'':'none';
  document.getElementById('view-overview').style.display=v==='overview'?'':'none';
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('on'));
  if(btn)btn.classList.add('on');
  if(v==='overview')renderOverview();
}

load();renderWeek();renderBoard();renderOverview();
</script>
